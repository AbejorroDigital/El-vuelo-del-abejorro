<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validando Acceso...</title>
    <style>
        .loader { font-family: sans-serif; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>
    <div id="status" class="loader">Verificando conexión segura...</div>
    <div id="container" style="display:none; width:100%; height:100vh;"></div>

    <script>
        const targetUrl = "https://abejorro-digital.rf.gd/el-vuelo-del-abejorro/";
        
        async function validateAndLoad() {
            try {
                // Intentamos un fetch simple para disparar el intercambio de cookies
                // Usamos 'no-cors' para evitar el bloqueo inmediato y permitir que las cookies se procesen
                await fetch(targetUrl, { mode: 'no-cors' });
                
                console.log("Cookie handshake intentado...");
                
                // Esperamos un momento para que el navegador procese la posible cookie __test
                setTimeout(() => {
                    document.getElementById('status').style.display = 'none';
                    const container = document.getElementById('container');
                    container.style.display = 'block';
                    container.innerHTML = `<iframe src="${targetUrl}" style="width:100%; height:100%; border:none;"></iframe>`;
                }, 1500);

            } catch (error) {
                document.getElementById('status').innerText = "Error de conexión. Reintentando...";
                console.error(error);
            }
        }

        validateAndLoad();
    </script>
</body>
</html>
